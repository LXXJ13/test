<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فيد ستريم — شاشة العرض</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap');
:root{
  --purple:#2e9b9b;--purple2:#5dbfbf;--purple3:#1d7a7a;
  --green:#10b981;--muted2:#4a8a8a;--red:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#060f0f;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 35% 50%,#0d2424 0%,#060f0f 70%)}
.bg-blur{position:absolute;inset:-20px;background-size:cover;background-position:center;filter:blur(40px) brightness(.2) saturate(1.5);opacity:0;transition:opacity 1.2s}
.bg-blur.show{opacity:1}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}

/* ── IDLE ── */
.idle{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:10;transition:opacity .6s;
}
.idle.hidden{opacity:0;pointer-events:none}

.idle-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:28px;width:100%;height:100%;
}

/* Animated logo block */
.logo-anim-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
}
.anim-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(46,155,155,.2);
  animation:aRing 3s ease-out infinite;
}
.anim-ring:nth-child(1){width:200px;height:200px;animation-delay:0s}
.anim-ring:nth-child(2){width:270px;height:270px;animation-delay:1s}
.anim-ring:nth-child(3){width:340px;height:340px;animation-delay:2s}
.anim-ring:nth-child(4){width:410px;height:410px;animation-delay:2.8s}
@keyframes aRing{0%{opacity:.5;transform:scale(.8)}100%{opacity:0;transform:scale(1.08)}}

/* spinning arcs */
.anim-arc{
  position:absolute;width:175px;height:175px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:rgba(46,155,155,.45);
  border-right-color:rgba(93,191,191,.2);
  animation:arcSpin 3.5s linear infinite;
}
.anim-arc2{
  position:absolute;width:148px;height:148px;border-radius:50%;
  border:1px solid transparent;
  border-bottom-color:rgba(46,155,155,.3);
  animation:arcSpin 6s linear infinite reverse;
}
@keyframes arcSpin{to{transform:rotate(360deg)}}

.anim-logo{
  width:250px;height:auto;position:relative;z-index:2;
  animation:logoFloat 4s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0);filter:drop-shadow(0 0 22px rgba(46,155,155,.55))}
  50%{transform:translateY(-12px);filter:drop-shadow(0 14px 32px rgba(46,155,155,.8)) drop-shadow(0 0 60px rgba(93,191,191,.4))}
}
.anim-shadow{
  position:absolute;bottom:-22px;
  width:70px;height:8px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(46,155,155,.35) 0%,transparent 70%);
  animation:shadowPulse 4s ease-in-out infinite;
}
@keyframes shadowPulse{0%,100%{transform:scaleX(1);opacity:.55}50%{transform:scaleX(.5);opacity:.2}}

/* text */
.idle-title{
  font-family:'Tajawal',sans-serif;font-size:clamp(16px,2.5vw,26px);font-weight:700;
  color:rgba(232,232,255,.85);letter-spacing:2px;text-align:center;
  animation:textPulse 3s ease-in-out infinite;
}
@keyframes textPulse{0%,100%{opacity:.7}50%{opacity:1}}

.idle-sub{font-family:'Tajawal',sans-serif;font-size:14px;color:var(--muted2);text-align:center}

.idle-status{display:flex;align-items:center;gap:8px;font-family:'Tajawal',sans-serif;font-size:12px;color:var(--muted2)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--muted2);transition:background .3s,box-shadow .3s}
.sdot.ok{background:var(--green);box-shadow:0 0 12px var(--green);animation:sdotPulse 2s ease-in-out infinite}
@keyframes sdotPulse{0%,100%{box-shadow:0 0 6px var(--green)}50%{box-shadow:0 0 18px var(--green)}}

.dots{display:flex;gap:5px;margin-top:4px;justify-content:center}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--muted2);animation:db 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.3);background:var(--purple2)}}

/* ── PLAYER ── */
.player-wrap{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .7s cubic-bezier(.4,0,.2,1)}
.player-wrap.active{opacity:1;pointer-events:all}
#vid{width:100%;height:100%;object-fit:contain}

/* ── HUD ── */
.hud{position:fixed;inset:0;z-index:30;pointer-events:none;display:flex;flex-direction:column}
.hud-top{
  display:flex;align-items:center;justify-content:space-between;padding:22px 30px;
  background:linear-gradient(rgba(6,15,15,.85),transparent);
  transform:translateY(-100%);transition:transform .45s ease;
}
.hud-top.show{transform:translateY(0)}
.hud-logo{height:50px;width:auto;filter:drop-shadow(0 0 8px rgba(46,155,155,.6))}
.hud-sender{font-family:'Tajawal',sans-serif;font-size:20px;font-weight:700;color:#fff}
.hud-sender span{font-size:30px;font-weight:400;letter-spacing:1.5px;color:rgba(255,255,255,.35);margin-left:8px}
.hud-live{display:flex;align-items:center;gap:7px;font-family:'Tajawal',sans-serif;font-size:11px;letter-spacing:2px;color:var(--red)}
.hud-live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hud-bottom{margin-top:auto;background:linear-gradient(transparent,rgba(6,15,15,.85));transform:translateY(100%);transition:transform .45s ease}
.hud-bottom.show{transform:translateY(0)}
.prog-bar{width:100%;height:3px;background:rgba(255,255,255,.1)}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--purple3),var(--purple),var(--purple2));transition:width .1s linear;box-shadow:0 0 8px var(--purple)}
.hud-bot-info{display:flex;align-items:center;justify-content:space-between;padding:14px 30px 24px}
.hud-time{font-family:'Tajawal',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.5)}

/* ── INCOMING ── */
.incoming{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.incoming.show{animation:incAnim 1.6s ease-out forwards}
@keyframes incAnim{0%{opacity:0}15%{opacity:1}70%{opacity:1}100%{opacity:0}}
.inc-card{
  background:rgba(6,15,15,.92);border:1px solid rgba(46,155,155,.4);
  border-radius:24px;padding:28px 56px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  backdrop-filter:blur(30px);
  box-shadow:0 0 80px rgba(46,155,155,.2),0 0 0 1px rgba(46,155,155,.1),0 30px 80px rgba(0,0,0,.7);
}
.inc-label{font-family:'Tajawal',sans-serif;font-size:11px;letter-spacing:3px;color:var(--purple2);text-transform:uppercase}
.inc-name{font-family:'Tajawal',sans-serif;font-weight:900;font-size:clamp(26px,5vw,48px);color:#fff}
.inc-sub{font-family:'Tajawal',sans-serif;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px}

/* ── BUFFERING ── */
.buffering{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:40;display:none}
.buffering.show{display:block}
.buf-spin{width:44px;height:44px;border-radius:50%;border:3px solid rgba(46,155,155,.1);border-top-color:var(--purple);animation:spin .9s linear infinite;box-shadow:0 0 20px rgba(46,155,155,.3)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ACTIVATION OVERLAY ── */
#activateOverlay {
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;cursor:pointer;
  background:radial-gradient(ellipse at 50% 50%, #0a1f1f 0%, #060f0f 70%);
}
#activateOverlay .act-ring {
  width:140px;height:140px;border-radius:50%;
  border:2px solid rgba(46,155,155,.35);
  display:flex;align-items:center;justify-content:center;
  animation:actPulse 2s ease-in-out infinite;
  position:relative;
}
#activateOverlay .act-ring::before {
  content:'';position:absolute;inset:-14px;border-radius:50%;
  border:1px solid rgba(46,155,155,.15);animation:actPulse 2s ease-in-out infinite .4s;
}
#activateOverlay .act-icon { font-size:52px; }
@keyframes actPulse {
  0%,100%{box-shadow:0 0 0 0 rgba(46,155,155,.4)}
  50%{box-shadow:0 0 0 20px rgba(46,155,155,0)}
}
#activateOverlay h2 {
  font-family:'Tajawal',sans-serif;font-size:22px;font-weight:700;
  color:rgba(232,232,255,.9);letter-spacing:1px;
}
#activateOverlay p {
  font-family:'Tajawal',sans-serif;font-size:14px;color:#4a8a8a;
}

</style>
</head>

    <div class="hud-sender"><span>من</span> <span id="hudSender">—</span></div>
    <div class="hud-live">مباشر</div>
  </div>
  <div class="hud-bottom" id="hudBottom">
    <div class="prog-bar"><div class="prog-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="incoming" id="incoming">
  <div class="inc-card">
    <div class="inc-label">مقطع الطالب </div>
    <div class="inc-name" id="incomingName">—</div>
    <div class="inc-sub">يُشغَّل الآن</div>
  </div>
</div>

<div class="buffering" id="buffering"><div class="buf-spin"></div></div>

<script>

// ── DOM refs ───────────────────────────────────────────────────────────────
const vid         = document.getElementById("vid");
const idle        = document.getElementById("idle");
const playerWrap  = document.getElementById("playerWrap");
const hudTop      = document.getElementById("hudTop");
const hudBottom   = document.getElementById("hudBottom");
const progressFill= document.getElementById("progressFill");
const incoming    = document.getElementById("incoming");
const incomingName= document.getElementById("incomingName");
const hudSender   = document.getElementById("hudSender");
const buffering   = document.getElementById("buffering");

// ── State ──────────────────────────────────────────────────────────────────
let ws             = null;
let reconnectTimer = null;
let progressTimer  = null;
let reconnectDelay = 1000;
let playGeneration = 0;   // incremented each playVideo() call to cancel stale callbacks
let isPlaying      = false;

// ── WebSocket with exponential backoff ────────────────────────────────────
// 🔐 يجب أن يطابق SECRET_TOKEN في server.js
const WS_TOKEN = "sjdhf34Da2";

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}?role=player&token=${WS_TOKEN}`);

  ws.onopen = () => {
    setStatus(true);
    clearTimeout(reconnectTimer);
    reconnectDelay = 1000;
  };

  ws.onclose = () => {
    setStatus(false);
    reconnectTimer = setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 8000);
  };

  ws.onerror = () => {};

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch (_) { return; }
    if (msg.type === "play" && msg.video) playVideo(msg.video);
  };
}

function setStatus(ok) {
  document.getElementById("statusDot").className = "status-dot" + (ok ? " connected" : "");
  document.getElementById("statusLabel").textContent = ok ? "متصل — في انتظار المقاطع" : "إعادة الاتصال…";
}

// ── Hard-reset the video element (no race conditions) ──────────────────────
function resetVideo() {
  // Remove ALL event listeners by cloning — guaranteed clean slate
  const fresh = vid.cloneNode(false);
  vid.parentNode.replaceChild(fresh, vid);
  // Re-assign the module-level reference
  Object.defineProperty(window, 'vidEl', { value: fresh, configurable: true });
  return fresh;
}

// ── Play ───────────────────────────────────────────────────────────────────
function playVideo(video) {
  // Cancel any in-flight play sequence
  const gen = ++playGeneration;
  clearInterval(progressTimer);

  // Stop & fully detach current video
  try { vid.pause(); } catch(_) {}
  vid.removeAttribute("src");
  vid.load();

  // Show incoming banner
  incomingName.textContent = video.sender || "—";
  incoming.classList.remove("show");
  void incoming.offsetWidth; // force reflow to restart animation
  incoming.classList.add("show");

  // Show buffering immediately so the screen isn't blank
  buffering.classList.add("show");
  hudSender.textContent = video.sender || "—";

  // Small yield so browser can repaint the banner before we start loading
  requestAnimationFrame(() => {
    if (gen !== playGeneration) return; // superseded

    // ── Attach fresh, one-time-only event handlers ──────────────────────
    let canplayFired = false;

    function onCanPlay() {
      if (gen !== playGeneration) return;
      if (canplayFired) return;
      canplayFired = true;
      buffering.classList.remove("show");

      vid.play().then(() => {
        if (gen !== playGeneration) { vid.pause(); return; }
        isPlaying = true;
        idle.classList.add("hidden");
        playerWrap.classList.add("active");
        hudTop.classList.add("show");
        hudBottom.classList.add("show");
        startProgress();
      }).catch(err => {
        console.error("play() rejected:", err);
        if (gen !== playGeneration) return;
        buffering.classList.remove("show");
        // Autoplay blocked — retry once on user gesture or just show idle
        returnToIdle();
      });
    }

    function onWaiting() {
      if (gen === playGeneration) buffering.classList.add("show");
    }
    function onPlaying() {
      if (gen === playGeneration) buffering.classList.remove("show");
    }
    function onEnded() {
      if (gen !== playGeneration) return;
      setTimeout(returnToIdle, 1500);
    }
    function onError() {
      if (gen !== playGeneration) return;
      console.error("Video error:", vid.error);
      buffering.classList.remove("show");
      returnToIdle();
    }
    function onStalled() {
      // stalled can fire on seek/start — show buffering but don't abort
      if (gen === playGeneration) buffering.classList.add("show");
    }

    vid.addEventListener("canplay",  onCanPlay,  { once: true });
    vid.addEventListener("waiting",  onWaiting);
    vid.addEventListener("playing",  onPlaying);
    vid.addEventListener("ended",    onEnded,    { once: true });
    vid.addEventListener("error",    onError,    { once: true });
    vid.addEventListener("stalled",  onStalled);

    // Safety timeout — if canplay never fires after 15s, abort
    const safetyTimer = setTimeout(() => {
      if (gen !== playGeneration || canplayFired) return;
      console.warn("canplay timeout — aborting");
      buffering.classList.remove("show");
      returnToIdle();
    }, 15000);

    // Cleanup helper called on ended/error so lingering listeners don't fire
    function cleanup() {
      clearTimeout(safetyTimer);
      vid.removeEventListener("waiting", onWaiting);
      vid.removeEventListener("playing", onPlaying);
      vid.removeEventListener("stalled", onStalled);
    }
    vid.addEventListener("ended", cleanup, { once: true });
    vid.addEventListener("error", cleanup, { once: true });

    // ── Actually load ───────────────────────────────────────────────────
    vid.preload = "auto";
    vid.src = (video.url.startsWith("http") ? video.url : location.origin + video.url);
    vid.load();
  });
}

// ── Return to idle cleanly ────────────────────────────────────────────────
function returnToIdle() {
  isPlaying = false;
  playGeneration++; // invalidate any pending callbacks
  clearInterval(progressTimer);

  playerWrap.classList.remove("active");
  hudTop.classList.remove("show");
  hudBottom.classList.remove("show");
  buffering.classList.remove("show");
  progressFill.style.width = "0%";

  try { vid.pause(); } catch(_) {}
  vid.removeAttribute("src");
  vid.load();

  setTimeout(() => idle.classList.remove("hidden"), 400);
}

// ── Progress bar ──────────────────────────────────────────────────────────
function startProgress() {
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    if (!vid.duration || isNaN(vid.duration)) return;
    const pct = Math.min((vid.currentTime / vid.duration) * 100, 100);
    progressFill.style.width = `${pct}%`;
  }, 200);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return "0:00";
  const m = Math.floor(s / 60);
  return `${m}:${Math.floor(s % 60).toString().padStart(2, "0")}`;
}

// ── Activation gate (solves autoplay block) ───────────────────────────────
let activated = false;
let pendingVideo = null;

document.getElementById("activateOverlay").addEventListener("click", function() {
  if (activated) return;
  activated = true;

  // Unlock autoplay by playing + immediately pausing a silent video
  vid.muted = true;
  vid.src = "";
  vid.play().catch(() => {});
  vid.pause();
  vid.muted = false;

  // Hide overlay
  this.style.transition = "opacity .5s";
  this.style.opacity = "0";
  setTimeout(() => { this.style.display = "none"; }, 500);

  // Connect WS now that user has interacted
  connect();

  // Play any video that arrived before activation
  if (pendingVideo) {
    setTimeout(() => playVideo(pendingVideo), 300);
    pendingVideo = null;
  }
});

// Override playVideo to queue if not yet activated
const _origPlayVideo = playVideo;
window.playVideo = function(video) {
  if (!activated) {
    pendingVideo = video;
    // Flash the overlay so user knows something arrived
    const ov = document.getElementById("activateOverlay");
    if (ov) {
      ov.style.background = "radial-gradient(ellipse at 50% 50%, #0d2626 0%, #060f0f 70%)";
      setTimeout(() => { ov.style.background = ""; }, 400);
    }
    return;
  }
  _origPlayVideo(video);
};

</script>
